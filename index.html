<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gribouille</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#fdf9f4;--cream2:#f5ede0;--cream3:#e8d9c4;
  --blush3:#d4788a;--taupe2:#c4a882;
  --dark:#111111;--dark2:#222222;--muted:#555555;
  --sage:#8aaa8a;--sage2:#e4ede4;
  --amber:#c49050;--amber2:#fdf0dc;
  --lavender2:#eee8f8;
  --shadow:0 2px 0 var(--cream3),0 8px 32px rgba(0,0,0,.08);
}
body{
  font-family:'Jost',sans-serif;
  background:linear-gradient(145deg,#f5efe8 0%,#ede3d8 40%,#e8ddd5 100%);
  min-height:100vh;display:flex;align-items:flex-start;
  justify-content:center;padding:32px 16px 48px;
}
@keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}

/* LOGIN */
#vLogin{display:flex;flex-direction:column;align-items:center;gap:32px;padding-top:24px;width:100%;max-width:360px;animation:fadeUp .5s ease;position:relative;z-index:1}
#paw-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.login-name{font-family:'Playfair Display',serif;font-size:38px;font-weight:600;color:var(--dark);letter-spacing:-.5px;margin-top:12px;line-height:1;text-align:center}
.login-tagline{font-size:13px;color:var(--blush3);margin-top:8px;letter-spacing:.4px;font-style:italic;font-family:'Playfair Display',serif;text-align:center}
.login-card{background:#fff;border-radius:28px;border:1px solid var(--cream3);padding:2.2rem 2rem 2rem;width:100%;box-shadow:var(--shadow);text-align:center}
.pips{display:flex;gap:16px;justify-content:center;margin-bottom:28px}
.pip{width:14px;height:14px;border-radius:50%;border:2px solid var(--cream3);background:transparent;transition:all .2s;display:inline-block}
.pip.on{background:var(--dark);border-color:var(--dark)}
.pip.err{background:#e55;border-color:#c33;animation:shake .4s}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:0 auto}
.kb{height:60px;border-radius:16px;background:var(--cream2);border:1px solid var(--cream3);font-size:21px;font-weight:400;color:var(--dark);cursor:pointer;transition:all .12s;font-family:'Jost',sans-serif;display:flex;align-items:center;justify-content:center}
.kb:hover{background:var(--cream3)}
.kb:active{transform:scale(.91)}
.kb.action{background:var(--dark);color:#fff;border-color:var(--dark);font-size:24px}
.kb.action:hover{background:#333}
.kb.del{font-size:18px;color:var(--muted)}
.login-err{font-size:12px;color:#c44;margin-top:14px;min-height:16px}

/* CALENDAR */
#vCal{width:100%;max-width:1100px;display:none;animation:fadeUp .4s ease}
.cal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:12px;padding:0 2px}
.cal-brand{display:flex;align-items:center;gap:10px}
.cal-brand-name{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--blush3)}
.month-nav{display:flex;align-items:center;gap:6px}
.nav-btn{width:36px;height:36px;border-radius:10px;background:#fff;border:1px solid var(--cream3);font-size:17px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s}
.nav-btn:hover{background:var(--cream2)}
.month-label{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:var(--dark);letter-spacing:-.3px;min-width:220px;text-align:center}
.top-right{display:flex;gap:8px}
.today-btn,.out-btn{height:36px;padding:0 18px;border-radius:10px;background:#fff;border:1px solid var(--cream3);font-size:12px;font-weight:500;color:var(--dark2);cursor:pointer;letter-spacing:.3px;text-transform:uppercase;transition:all .12s;font-family:'Jost',sans-serif}
.today-btn:hover,.out-btn:hover{background:var(--cream2)}
.out-btn{color:var(--muted)}
#wrange{text-align:center;font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--muted);margin-bottom:18px}
.week-container{background:#fff;border-radius:20px;border:1px solid var(--cream3);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.week-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--cream3);background:var(--cream2)}
.wh-day{padding:14px 10px 12px;text-align:center;border-right:1px solid var(--cream3);cursor:default}
.wh-day:last-child{border-right:none}
.wh-dayname{font-size:11px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.wh-daynum{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--dark);line-height:1}
.wh-day.is-today .wh-dayname{color:var(--blush3)}
.wh-day.is-today .wh-daynum{background:var(--dark);color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.week-body{display:grid;grid-template-columns:repeat(7,1fr);min-height:400px}
.day-col{border-right:1px solid var(--cream3);padding:10px 8px;min-height:400px;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:5px}
.day-col:last-child{border-right:none}
.day-col:hover{background:var(--cream2)}
.day-col.is-today{background:#fffcf8}
.day-col.is-sel{background:var(--amber2)!important;border-right:1px solid var(--amber)}
.evt-pill{border-radius:8px;padding:4px 8px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;line-height:1.3;word-break:break-word}
.evt-emoji{font-size:13px;flex-shrink:0}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:28px;border:1px solid var(--cream3);padding:2rem;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;animation:popIn .22s ease}
.modal-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.4rem}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--dark);line-height:1.2}
.modal-subtitle{font-size:12px;color:var(--muted);margin-top:2px;font-style:italic}
.close-btn{width:32px;height:32px;border-radius:9px;background:var(--cream2);border:1px solid var(--cream3);font-size:15px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.close-btn:hover{background:var(--cream3)}
.mlabel{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.tb{padding:7px 14px;border-radius:22px;border:1.5px solid transparent;cursor:pointer;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all .12s;font-family:'Jost',sans-serif}
.tb:hover{filter:brightness(.95)}
.tb.active{outline:2.5px solid var(--dark);outline-offset:2px}
.minput{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--cream3);font-size:14px;outline:none;font-family:'Jost',sans-serif;color:var(--dark);background:var(--cream2);transition:border-color .15s}
.minput:focus{border-color:var(--taupe2);background:#fff}
.mbtn{padding:10px 20px;border-radius:12px;border:1.5px solid var(--cream3);background:var(--cream2);color:var(--dark);font-size:13px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif;transition:all .12s}
.mbtn:hover{background:var(--cream3)}
.mbtn.danger{color:#c44}
.save-ok{font-size:12px;color:var(--sage);text-align:right;margin-top:8px;display:none;font-weight:500}
</style>
</head>

  <div class="cal-top">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyATZMIidR1kt_Wp78RrezwMjJdWq2XfAds",
  authDomain:"gribouille-9f6c1.firebaseapp.com",
  projectId:"gribouille-9f6c1",
  storageBucket:"gribouille-9f6c1.firebasestorage.app",
  messagingSenderId:"25419182581",
  appId:"1:25419182581:web:8ed50ad235d44d6642b0bc"
});
const db = firebase.firestore();

const MN=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const TM={
  rdv:{e:'📅',bg:'#eee8f8',c:'#5a3a8a'},
  med:{e:'💊',bg:'#fdf0dc',c:'#8a5f1a'},
  repas:{e:'🥕',bg:'#e4ede4',c:'#3a6b3e'}
};

let weekStart=null, sD=null, sT=null, ent='';
const PIN='0403';
const fmtKey=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;

async function getDd(key){
  try{const s=await db.collection('gribouille').doc(key).get();return s.exists?s.data():{}}
  catch(e){return{};}
}
async function setDd(key,data){
  try{await db.collection('gribouille').doc(key).set(data);}catch(e){}
}
async function delDd(key){
  try{await db.collection('gribouille').doc(key).delete();}catch(e){}
}

function getMonday(d){
  const dt=new Date(d),day=dt.getDay()||7;
  dt.setDate(dt.getDate()-day+1);dt.setHours(0,0,0,0);return dt;
}

function upP(sh){
  for(let i=0;i<4;i++){
    const p=document.getElementById('p'+i);p.className='pip';
    if(sh)p.classList.add('err');
    else if(i<ent.length)p.classList.add('on');
  }
}
function kp(d){if(ent.length>=4)return;ent+=d;upP(false);if(ent.length===4)setTimeout(kpGo,200)}
function kpD(){if(ent.length>0)ent=ent.slice(0,-1);upP(false);document.getElementById('lerr').style.display='none'}
function kpGo(){
  if(ent===PIN){
    document.getElementById('vLogin').style.display='none';
    document.getElementById('paw-bg').style.display='none';
    document.getElementById('vCal').style.display='block';
    weekStart=getMonday(new Date());rCal();
  }else{
    upP(true);document.getElementById('lerr').style.display='block';
    setTimeout(()=>{ent='';upP(false)},700);
  }
}
function doOut(){
  ent='';upP(false);
  document.getElementById('lerr').style.display='none';
  document.getElementById('vCal').style.display='none';
  document.getElementById('paw-bg').style.display='block';
  document.getElementById('vLogin').style.display='flex';
  document.getElementById('vEvt').style.display='none';
}
function goToday(){weekStart=getMonday(new Date());sD=null;rCal()}

async function rCal(){
  const now=new Date();now.setHours(0,0,0,0);
  const sun=new Date(weekStart);sun.setDate(sun.getDate()+6);
  const m1=MN[weekStart.getMonth()],m2=MN[sun.getMonth()];
  document.getElementById('mlbl').textContent=m1===m2?m1:m1+' – '+m2;
  const fmt=d=>`${d.getDate()} ${MN[d.getMonth()].substring(0,3)}.`;
  document.getElementById('wrange').textContent=fmt(weekStart)+' → '+fmt(sun)+' '+sun.getFullYear();
  for(let i=0;i<7;i++){
    const dt=new Date(weekStart);dt.setDate(dt.getDate()+i);
    const isT=dt.getTime()===now.getTime();
    document.getElementById('wh'+i).className='wh-day'+(isT?' is-today':'');
    document.getElementById('wdn'+i).textContent=dt.getDate();
    const col=document.getElementById('dc'+i);
    col.className='day-col'+(isT?' is-today':'')+(sD===i?' is-sel':'');
    const dd=await getDd(fmtKey(dt));
    let html='';
    if(dd.events&&dd.events.length){
      dd.events.forEach(ev=>{
        const m=TM[ev.type];
        const bg=m?m.bg:'#f5ede0',c2=m?m.c:'#6a5448',em=m?m.e:'🐾';
        html+=`<div class="evt-pill" style="background:${bg};color:${c2}"><span class="evt-emoji">${em}</span><span>${ev.title||''}</span></div>`;
      });
    }
    col.innerHTML=html;
  }
}

async function oDay(i){
  sD=i;
  const dt=new Date(weekStart);dt.setDate(dt.getDate()+i);
  const dd=await getDd(fmtKey(dt));
  const days=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  document.getElementById('edlbl').textContent=days[i]+' '+dt.getDate()+' '+MN[dt.getMonth()]+' '+dt.getFullYear();
  document.getElementById('etitle').value='';
  document.getElementById('sok').style.display='none';
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  sT=null;
  renderBubbles(dd.events||[]);
  document.getElementById('vEvt').style.display='flex';
  setTimeout(()=>document.getElementById('etitle').focus(),80);
  rCal();
}

function renderBubbles(events){
  const el=document.getElementById('elist');el.innerHTML='';
  events.forEach((ev,idx)=>{
    const m=TM[ev.type];
    const bg=m?m.bg:'#f5ede0',col=m?m.c:'#6a5448',em=m?m.e:'🐾';
    const wrap=document.createElement('div');
    wrap.style.cssText='display:flex;align-items:flex-start;gap:8px';
    const bubble=document.createElement('div');
    bubble.style.cssText=`flex:1;background:${bg};color:${col};border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.4;word-break:break-word`;
    bubble.innerHTML=`<span style="margin-right:5px">${em}</span>${ev.title||''}`;
    const btn=document.createElement('button');
    btn.textContent='✕';
    btn.style.cssText='width:28px;height:28px;border-radius:8px;border:1px solid #e8d9c4;background:#faf7f2;color:#9a8070;cursor:pointer;font-size:13px;flex-shrink:0;margin-top:6px';
    btn.onclick=()=>rmEvt(idx);
    wrap.appendChild(bubble);wrap.appendChild(btn);
    el.appendChild(wrap);
  });
}

function sTag(t){
  sT=(sT===t)?null:t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.t===sT));
}

async function addBubble(){
  const ti=document.getElementById('etitle').value.trim();
  if(!ti)return;
  const dt=new Date(weekStart);dt.setDate(dt.getDate()+sD);
  const k=fmtKey(dt);
  const dd=await getDd(k);
  if(!dd.events)dd.events=[];
  dd.events.push({type:sT||null,title:ti});
  await setDd(k,dd);
  document.getElementById('etitle').value='';
  sT=null;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  renderBubbles(dd.events);
  const sok=document.getElementById('sok');
  sok.style.display='block';
  clearTimeout(window._t);
  window._t=setTimeout(()=>sok.style.display='none',1400);
  rCal();
  document.getElementById('etitle').focus();
}

async function rmEvt(idx){
  const dt=new Date(weekStart);dt.setDate(dt.getDate()+sD);
  const k=fmtKey(dt);
  const dd=await getDd(k);
  if(dd.events)dd.events.splice(idx,1);
  await setDd(k,dd);
  renderBubbles(dd.events||[]);
  rCal();
}

async function delDay(){
  const dt=new Date(weekStart);dt.setDate(dt.getDate()+sD);
  await delDd(fmtKey(dt));
  cModal();
}

function cModal(){document.getElementById('vEvt').style.display='none';sD=null;rCal()}
function prevW(){weekStart.setDate(weekStart.getDate()-7);sD=null;document.getElementById('vEvt').style.display='none';rCal()}
function nextW(){weekStart.setDate(weekStart.getDate()+7);sD=null;document.getElementById('vEvt').style.display='none';rCal()}

document.addEventListener('keydown',e=>{
  if(document.getElementById('vLogin').style.display!=='none'){
    if(e.key>='0'&&e.key<='9')kp(e.key);
    else if(e.key==='Backspace')kpD();
    else if(e.key==='Enter')kpGo();
  }
});
</script>
</body>
