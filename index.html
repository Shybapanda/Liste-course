<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Gribouille</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:linear-gradient(160deg,#f5efe8 0%,#ede3d8 50%,#e8ddd5 100%);
  --card:#fff;
  --border:#e8d9c4;
  --cream:#f5ede0;
  --cream2:#ede3d8;
  --dark:#111;
  --muted:#888;
  --blush:#d4788a;
  --amber2:#fdf0dc;
  --sage2:#e4ede4;
  --lav2:#eee8f8;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
}

/* ─── SCREENS ─── */
.screen{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─── LOGIN ─── */
#sLogin{
  align-items:center;justify-content:center;gap:28px;
  padding:24px 24px 40px;position:relative;
}
#pawBg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.login-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:28px;width:100%}
.bunny-wrap{animation:hop 2.6s ease-in-out infinite;display:inline-block}
.login-name{font-family:'Playfair Display',serif;font-size:32px;font-weight:600;color:var(--dark);text-align:center;margin-top:8px}
.login-tag{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--blush);text-align:center;margin-top:4px}
.login-card{background:var(--card);border-radius:28px;border:1px solid var(--border);padding:28px 24px 24px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center}
.pips{display:flex;gap:16px;justify-content:center;margin-bottom:24px}
.pip{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .2s;display:inline-block}
.pip.on{background:var(--dark);border-color:var(--dark)}
.pip.err{background:#e55;border-color:#c33;animation:shake .4s}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.kb{height:64px;border-radius:18px;background:var(--cream);border:1px solid var(--border);font-size:22px;font-weight:400;color:var(--dark);cursor:pointer;transition:all .1s;font-family:'Jost',sans-serif;display:flex;align-items:center;justify-content:center;user-select:none}
.kb:active{transform:scale(.91);background:var(--cream2)}
.kb.act{background:var(--dark);color:#fff;border-color:var(--dark);font-size:26px}
.kb.act:active{background:#333}
.kb.del{font-size:18px;color:var(--muted)}
.login-err{font-size:12px;color:#c44;margin-top:12px;min-height:16px}

/* ─── CALENDAR ─── */
#sCal{display:none;flex-direction:column}

.cal-header{
  padding:16px 16px 0;
  display:flex;flex-direction:column;gap:8px;
  background:transparent;flex-shrink:0;
}
.cal-top-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:8px}
.brand-name{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--blush)}
.out-btn{height:34px;padding:0 14px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:12px;color:var(--muted);cursor:pointer;font-family:'Jost',sans-serif;text-transform:uppercase;letter-spacing:.3px}

.month-row{display:flex;align-items:center;justify-content:center;gap:10px}
.nav-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:18px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:var(--cream2)}
.month-lbl{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--dark);min-width:180px;text-align:center}
.week-range{text-align:center;font-size:12px;font-style:italic;color:var(--muted);padding:4px 0 10px}

/* Day rows */
.days-list{
  flex:1;overflow-y:auto;
  background:var(--card);
  margin:0 12px 12px;
  border-radius:20px;
  border:1px solid var(--border);
  box-shadow:0 2px 0 var(--border),0 8px 24px rgba(0,0,0,.06);
}
.day-row{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;min-height:58px;
}
.day-row:last-child{border-bottom:none}
.day-row:active{background:var(--cream)}
.day-row.today{background:#fffcf8}
.day-row.today:active{background:var(--cream)}
.day-row.sel{background:var(--amber2)!important}

.day-label{
  width:90px;flex-shrink:0;
  padding:12px 10px 12px 16px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;justify-content:center;
}
.day-name{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
.day-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--dark);line-height:1;margin-top:2px}
.day-row.today .day-name{color:var(--blush)}
.day-row.today .day-num{
  background:var(--dark);color:#fff;border-radius:50%;
  width:32px;height:32px;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  margin-top:4px;
}

.day-events{
  flex:1;padding:10px 12px;
  display:flex;flex-wrap:wrap;gap:5px;
  align-items:center;
}
.empty-hint{font-size:11px;color:#ccc;font-style:italic}
.pill{
  border-radius:8px;padding:3px 9px;
  font-size:11px;font-weight:500;
  display:flex;align-items:center;gap:4px;
  line-height:1.4;
}

/* ─── MODAL ─── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:300;backdrop-filter:blur(3px);
}
.modal{
  background:var(--card);
  border-radius:28px 28px 0 0;
  padding:20px 20px 36px;
  width:100%;max-width:480px;
  max-height:88vh;overflow-y:auto;
  animation:slideUp .28s cubic-bezier(.34,1.28,.64,1);
}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--dark)}
.modal-sub{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic}
.close-btn{width:32px;height:32px;border-radius:9px;background:var(--cream);border:1px solid var(--border);font-size:15px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mlabel{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tb{padding:8px 14px;border-radius:22px;border:1.5px solid transparent;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;font-family:'Jost',sans-serif}
.tb:active{filter:brightness(.92)}
.tb.active{outline:2.5px solid var(--dark);outline-offset:2px}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.minput{flex:1;padding:13px 14px;border-radius:14px;border:1.5px solid var(--border);font-size:15px;outline:none;font-family:'Jost',sans-serif;color:var(--dark);background:var(--cream);-webkit-appearance:none}
.minput:focus{border-color:#bbb;background:#fff}
.add-btn{width:48px;height:48px;border-radius:14px;background:var(--dark);color:#fff;border:none;font-size:26px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.add-btn:active{background:#333}
.bubble-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.bubble-row{display:flex;align-items:flex-start;gap:8px;animation:popIn .18s ease}
.bubble{flex:1;border-radius:16px;padding:11px 14px;font-size:14px;line-height:1.4;word-break:break-word}
.del-btn{width:30px;height:30px;border-radius:9px;border:1px solid var(--border);background:var(--cream);color:var(--muted);cursor:pointer;font-size:13px;flex-shrink:0;margin-top:8px;display:flex;align-items:center;justify-content:center}
.del-btn:active{background:#fce8ec;color:#c44}
.bottom-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.clear-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--cream);color:#c44;font-size:13px;cursor:pointer;font-family:'Jost',sans-serif}
.save-ok{font-size:12px;color:#8aaa8a;font-weight:500;display:none}

@keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<!-- LOGIN -->

  <div id="pawBg">

<!-- CALENDAR -->

  <div class="cal-header">

      <div class="brand"><span style="font-size:20px">🐰</span><span class="brand-name">Le carnet de Gribouille</span></div>
      <button class="out-btn" onclick="doOut()">Quitter</button>
    </div>
    <div class="month-row">
      <button class="nav-btn" onclick="prevW()">‹</button>
      <div class="month-lbl" id="mlbl"></div>
      <button class="nav-btn" onclick="nextW()">›</button>
    </div>
    <div class="week-range" id="wrange"></div>
  </div>

</div>

<!-- MODAL -->
<div id="vEvt" class="modal-bg" style="display:none" onclick="bgClick(event)">

    <div class="modal-handle"></div>
    <div class="modal-hd">
      <div>
        <div class="modal-title" id="edlbl"></div>
        <div class="modal-sub">🐰 Gribouille</div>
      </div>

      <button class="tb" data-t="rdv" style="background:#eee8f8;color:#5a3a8a;border-color:#c8b8e8" onclick="sTag('rdv')">📅 RDV</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyATZMIidR1kt_Wp78RrezwMjJdWq2XfAds",
  authDomain:"gribouille-9f6c1.firebaseapp.com",
  projectId:"gribouille-9f6c1",
  storageBucket:"gribouille-9f6c1.firebasestorage.app",
  messagingSenderId:"25419182581",
  appId:"1:25419182581:web:8ed50ad235d44d6642b0bc"
});
const db=firebase.firestore();

const MN=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const TM={
  rdv:{e:'📅',bg:'#eee8f8',c:'#5a3a8a'},
  med:{e:'💊',bg:'#fdf0dc',c:'#8a5f1a'},
  repas:{e:'🥕',bg:'#e4ede4',c:'#3a6b3e'}
};

let weekStart=null,sD=null,sT=null,ent='';
const PIN='0403';
const fmtKey=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;

async function getDd(k){
  try{const s=await db.collection('gribouille').doc(k).get();return s.exists?s.data():{}}catch(e){return{}}
}
async function setDd(k,d){try{await db.collection('gribouille').doc(k).set(d)}catch(e){}}
async function delDd(k){try{await db.collection('gribouille').doc(k).delete()}catch(e){}}

function getMonday(d){
  const dt=new Date(d),day=dt.getDay()||7;
  dt.setDate(dt.getDate()-day+1);dt.setHours(0,0,0,0);return dt;
}

function upP(sh){
  for(let i=0;i<4;i++){
    const p=document.getElementById('p'+i);p.className='pip';
    if(sh)p.classList.add('err');else if(i<ent.length)p.classList.add('on');
  }
}
function kp(d){if(ent.length>=4)return;ent+=d;upP(false);if(ent.length===4)setTimeout(kpGo,220)}
function kpD(){if(ent.length>0)ent=ent.slice(0,-1);upP(false);document.getElementById('lerr').style.display='none'}
function kpGo(){
  if(ent===PIN){
    document.getElementById('sLogin').style.display='none';
    const c=document.getElementById('sCal');c.style.display='flex';
    weekStart=getMonday(new Date());rCal();
  }else{
    upP(true);document.getElementById('lerr').style.display='block';
    setTimeout(()=>{ent='';upP(false)},700);
  }
}
function doOut(){
  ent='';upP(false);
  document.getElementById('sCal').style.display='none';
  document.getElementById('sLogin').style.display='flex';
  document.getElementById('vEvt').style.display='none';
  document.getElementById('lerr').style.display='none';
}

async function rCal(){
  const now=new Date();now.setHours(0,0,0,0);
  const sun=new Date(weekStart);sun.setDate(sun.getDate()+6);
  const m1=MN[weekStart.getMonth()],m2=MN[sun.getMonth()];
  document.getElementById('mlbl').textContent=m1===m2?m1:m1+' / '+m2;
  const fmt=d=>`${d.getDate()} ${MN[d.getMonth()].substring(0,3)}.`;
  document.getElementById('wrange').textContent=fmt(weekStart)+' → '+fmt(sun)+' '+sun.getFullYear();

  const list=document.getElementById('daysList');list.innerHTML='';
  for(let i=0;i<7;i++){
    const dt=new Date(weekStart);dt.setDate(dt.getDate()+i);
    const isT=dt.getTime()===now.getTime();
    const isSel=sD===i;
    const dd=await getDd(fmtKey(dt));

    let chips='';
    if(dd.events&&dd.events.length){
      dd.events.forEach(ev=>{
        const m=TM[ev.type];
        const bg=m?m.bg:'#f5ede0',c2=m?m.c:'#6a5448',em=m?m.e:'🐾';
        chips+=`<div class="pill" style="background:${bg};color:${c2}"><span>${em}</span><span>${ev.title||''}</span></div>`;
      });
    }else{
      chips='<span class="empty-hint">Appuie pour ajouter...</span>';
    }

    const row=document.createElement('div');
    row.className='day-row'+(isT?' today':'')+(isSel?' sel':'');
    row.innerHTML=`
      <div class="day-label">
        <div class="day-name">${DAYS[i]}</div>
        <div class="day-num">${dt.getDate()}</div>
      </div>
      <div class="day-events">${chips}</div>`;
    row.onclick=()=>oDay(i);
    list.appendChild(row);
  }
}

async function oDay(i){
  sD=i;
  const dt=new Date(weekStart);dt.setDate(dt.getDate()+i);
  const dd=await getDd(fmtKey(dt));
  document.getElementById('edlbl').textContent=DAYS[i]+' '+dt.getDate()+' '+MN[dt.getMonth()];
  document.getElementById('etitle').value='';
  document.getElementById('sok').style.display='none';
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  sT=null;
  renderBubbles(dd.events||[]);
  document.getElementById('vEvt').style.display='flex';
  setTimeout(()=>document.getElementById('etitle').focus(),120);
  rCal();
}

function renderBubbles(events){
  const el=document.getElementById('elist');el.innerHTML='';
  events.forEach((ev,idx)=>{
    const m=TM[ev.type];
    const bg=m?m.bg:'#f5ede0',col=m?m.c:'#6a5448',em=m?m.e:'🐾';
    const row=document.createElement('div');row.className='bubble-row';
    const b=document.createElement('div');
    b.className='bubble';
    b.style.cssText=`background:${bg};color:${col}`;
    b.innerHTML=`<span style="margin-right:5px">${em}</span>${ev.title||''}`;
    const btn=document.createElement('button');
    btn.className='del-btn';btn.textContent='✕';
    btn.onclick=e=>{e.stopPropagation();rmEvt(idx)};
    row.appendChild(b);row.appendChild(btn);
    el.appendChild(row);
  });
}

function sTag(t){
  sT=(sT===t)?null:t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.t===sT));
}

async function addBubble(){
  const ti=document.getElementById('etitle').value.trim();
  if(!ti)return;
  const dt=new Date(weekStart);dt.setDate(dt.getDate()+sD);
  const k=fmtKey(dt);
  const dd=await getDd(k);
  if(!dd.events)dd.events=[];
  dd.events.push({type:sT||null,title:ti});
  await setDd(k,dd);
  document.getElementById('etitle').value='';
  sT=null;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  renderBubbles(dd.events);
  const sok=document.getElementById('sok');
  sok.style.display='block';
  clearTimeout(window._t);window._t=setTimeout(()=>sok.style.display='none',1400);
  rCal();
  document.getElementById('etitle').focus();
}

async function rmEvt(idx){
  const dt=new Date(weekStart);dt.setDate(dt.getDate()+sD);
  const k=fmtKey(dt);
  const dd=await getDd(k);
  if(dd.events)dd.events.splice(idx,1);
  await setDd(k,dd);
  renderBubbles(dd.events||[]);
  rCal();
}

async function delDay(){
  const dt=new Date(weekStart);dt.setDate(dt.getDate()+sD);
  await delDd(fmtKey(dt));cModal();
}

function cModal(){document.getElementById('vEvt').style.display='none';sD=null;rCal()}
function bgClick(e){if(e.target===e.currentTarget)cModal()}
function prevW(){weekStart.setDate(weekStart.getDate()-7);sD=null;document.getElementById('vEvt').style.display='none';rCal()}
function nextW(){weekStart.setDate(weekStart.getDate()+7);sD=null;document.getElementById('vEvt').style.display='none';rCal()}

document.addEventListener('keydown',e=>{
  if(document.getElementById('sLogin').style.display!=='none'){
    if(e.key>='0'&&e.key<='9')kp(e.key);
    else if(e.key==='Backspace')kpD();
    else if(e.key==='Enter')kpGo();
  }
});
</script>
</body>
</html>
