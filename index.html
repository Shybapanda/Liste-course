<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#F2F2F7"/>
<title>Courses</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F2F2F7;
  --card:#FFFFFF;
  --sep:rgba(60,60,67,.12);
  --label:#000000;
  --label2:rgba(60,60,67,.6);
  --label3:rgba(60,60,67,.3);
  --blue:#007AFF;
  --green:#34C759;
  --red:#FF3B30;
  --fill:rgba(118,118,128,.12);
}
html{height:100%}
body{
  min-height:100%;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  color:var(--label);
  padding-bottom:calc(110px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}

/* ═══ NAV BAR ═══ */
.navbar{
  position:sticky;top:0;z-index:100;
  background:rgba(242,242,247,.85);
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  padding:calc(12px + env(safe-area-inset-top)) 16px 8px;
  border-bottom:.5px solid var(--sep);
}
.large-title{
  font-size:34px;font-weight:700;letter-spacing:.4px;
  padding:4px 0 2px;
}
.nav-sub{
  font-size:13px;color:var(--label2);
  padding-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.progress-pill{
  font-size:13px;font-weight:600;color:var(--blue);
  background:rgba(0,122,255,.1);
  border-radius:20px;padding:3px 11px;
}

/* Add bar */
.add-wrap{
  display:flex;gap:8px;align-items:center;
}
.add-field{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--fill);
  border-radius:10px;padding:9px 12px;
}
.add-field svg{flex-shrink:0;opacity:.45}
.add-input{
  flex:1;font-size:17px;
  font-family:inherit;color:var(--label);
  background:transparent;border:none;outline:none;min-width:0;
}
.add-input::placeholder{color:var(--label3)}
.add-go{
  width:38px;height:38px;border-radius:50%;
  background:var(--blue);color:#fff;border:none;
  font-size:22px;font-weight:400;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s,opacity .1s;
}
.add-go:active{transform:scale(.9);opacity:.8}

/* ═══ LIST ═══ */
.content{padding:16px 16px 0;max-width:560px;margin:0 auto;width:100%}

.section{margin-bottom:22px}
.section-header{
  font-size:13px;font-weight:400;color:var(--label2);
  text-transform:uppercase;letter-spacing:.4px;
  padding:0 16px 7px;
  display:flex;align-items:center;gap:6px;
}
.section-header .cnt{margin-left:auto;font-size:13px}
.group{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
}
.row{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;
  min-height:44px;
  position:relative;
  cursor:pointer;
  transition:background .08s;
}
.row:active{background:rgba(0,0,0,.05)}
.row+.row::before{
  content:'';position:absolute;top:0;left:54px;right:0;
  height:.5px;background:var(--sep);
}
.checkbox{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--label3);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s cubic-bezier(.2,.8,.4,1);
  background:transparent;
}
.row.done .checkbox{
  background:var(--green);border-color:var(--green);
}
.row.done .checkbox::after{
  content:'';width:6px;height:11px;
  border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg) translate(-1px,-1px);
}
.row-text{
  flex:1;font-size:17px;line-height:1.3;
  transition:color .18s;word-break:break-word;
}
.row.done .row-text{
  color:var(--label3);
  text-decoration:line-through;
  text-decoration-color:var(--label3);
}
.row-del{
  width:28px;height:28px;border-radius:50%;
  background:transparent;border:none;
  color:var(--label3);cursor:pointer;
  font-size:17px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .1s;
}
.row-del:active{color:var(--red);transform:scale(.85)}

/* Done section */
.done-header{
  display:flex;align-items:center;
  padding:0 16px 7px;
  font-size:13px;color:var(--label2);
  text-transform:uppercase;letter-spacing:.4px;
  cursor:pointer;user-select:none;
  background:transparent;border:none;width:100%;
  font-family:inherit;
}
.done-header .chev{
  margin-left:auto;
  transition:transform .2s;
  font-size:13px;
}
.done-header.open .chev{transform:rotate(90deg)}

/* Empty */
.empty{
  text-align:center;padding:80px 30px;
}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-title{font-size:20px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:15px;color:var(--label2);line-height:1.4}

/* Loading */
.loading{text-align:center;padding:80px 30px;color:var(--label2);font-size:15px}
.spinner{
  width:28px;height:28px;margin:0 auto 14px;
  border:3px solid var(--fill);
  border-top-color:var(--label2);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ FOOTER BUTTON ═══ */
.footer{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:12px 16px calc(16px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,var(--bg) 60%,transparent);
  display:none;
  justify-content:center;
}
.footer.show{display:flex}
.clear-btn{
  background:var(--card);color:var(--red);
  border:none;border-radius:14px;
  padding:14px 26px;font-size:16px;font-weight:600;
  font-family:inherit;cursor:pointer;
  box-shadow:0 2px 16px rgba(0,0,0,.1);
  transition:transform .1s;
  width:100%;max-width:400px;
}
.clear-btn:active{transform:scale(.97)}

/* Toast */
.toast{
  position:fixed;top:calc(16px + env(safe-area-inset-top));left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:rgba(30,30,30,.92);color:#fff;
  border-radius:22px;padding:10px 20px;
  font-size:14px;font-weight:500;
  z-index:300;transition:transform .3s cubic-bezier(.2,.9,.3,1.2);
  backdrop-filter:blur(10px);
  white-space:nowrap;
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes itemIn{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}
.row{animation:itemIn .22s ease}
</style>
</head>

/* Normalisation : minuscules + sans accents */
function normalize(s){
  return s.toLowerCase()
    .replace(/\u0153/g,'oe').replace(/\u00e6/g,'ae')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[''-]/g,' ')
    .replace(/\s+/g,' ').trim();
}

function detectCat(name){
  var n=normalize(name);
  var best=null, bestScore=0;
  for(var cat in KEYWORDS){
    var words=KEYWORDS[cat];
    for(var i=0;i<words.length;i++){
      var kw=words[i];
      var score=0;
      if(n===kw){
        score=1000+kw.length;           // correspondance exacte : priorité max
      }else if(n.indexOf(kw)!==-1 && kw.length>=3){
        score=100+kw.length;            // le mot-clé est contenu dans la saisie
      }else if(kw.indexOf(n)===0 && n.length>=3){
        score=n.length;                 // la saisie est le début d'un mot-clé (faible)
      }
      if(score>bestScore){best=cat;bestScore=score;}
    }
  }
  return best||'autres';
}

/* ════════════ STATE ════════════ */
var items=[];

/* ════════════ TOAST ════════════ */
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(function(){t.classList.remove('show')},1800);
}

/* ════════════ DATA ════════════ */
function localLoad(){try{return JSON.parse(localStorage.getItem('courses')||'[]')}catch(e){return[]}}
function localSave(l){try{localStorage.setItem('courses',JSON.stringify(l))}catch(e){}}

function startListener(){
  if(!firebaseOk){
    items=localLoad();
    document.getElementById('subLabel').textContent='Mode local';
    render();
    return;
  }
  db.collection('courses').onSnapshot(function(snap){
    items=[];
    snap.forEach(function(doc){
      var d=doc.data();d.id=doc.id;items.push(d);
    });
    items.sort(function(a,b){return (a.ts||0)-(b.ts||0)});
    document.getElementById('subLabel').textContent='Synchronisé ✓';
    render();
  },function(err){
    console.error(err);
    items=localLoad();
    document.getElementById('subLabel').textContent='Hors ligne';
    render();
  });
}

function addItemData(name){
  var item={name:name,cat:detectCat(name),done:false,ts:Date.now()};
  if(firebaseOk){
    db.collection('courses').add(item).catch(function(e){
      console.error(e);toast('Erreur de sauvegarde');
    });
  }else{
    item.id='local_'+Date.now();
    items.push(item);localSave(items);render();
  }
}

function toggleItemData(item){
  if(firebaseOk&&item.id&&item.id.indexOf('local_')!==0){
    db.collection('courses').doc(item.id).update({done:!item.done}).catch(function(e){console.error(e)});
  }else{
    item.done=!item.done;localSave(items);render();
  }
}

function deleteItemData(id){
  if(firebaseOk&&id&&id.indexOf('local_')!==0){
    db.collection('courses').doc(id).delete().catch(function(e){console.error(e)});
  }else{
    items=items.filter(function(i){return i.id!==id});
    localSave(items);render();
  }
}

function clearDoneData(){
  var doneItems=items.filter(function(i){return i.done});
  if(!doneItems.length)return;
  if(firebaseOk){
    doneItems.forEach(function(i){
      if(i.id&&i.id.indexOf('local_')!==0){
        db.collection('courses').doc(i.id).delete().catch(function(e){});
      }
    });
  }else{
    items=items.filter(function(i){return !i.done});
    localSave(items);render();
  }
  toast(doneItems.length+' article'+(doneItems.length>1?'s':'')+' supprimé'+(doneItems.length>1?'s':''));
}

/* ════════════ RENDER ════════════ */
function render(){
  var el=document.getElementById('content');
  el.innerHTML='';

  var done=items.filter(function(i){return i.done});

  document.getElementById('progress').textContent=done.length+'/'+items.length;
  document.getElementById('footer').className='footer'+(done.length?' show':'');

  if(!items.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🛒</div><div class="empty-title">Liste vide</div><div class="empty-sub">Ajoute ton premier article<br>avec la barre en haut</div></div>';
    return;
  }

  // Group ALL items by category (done items stay in place, crossed out)
  var grouped={};
  items.forEach(function(item){
    var cat=CATS[item.cat]?item.cat:'autres';
    if(!grouped[cat])grouped[cat]=[];
    grouped[cat].push(item);
  });

  // Sorted category keys
  var sortedCats=Object.keys(grouped).sort(function(a,b){
    return CATS[a].order-CATS[b].order;
  });

  sortedCats.forEach(function(cat){
    var info=CATS[cat];
    // Inside each category: unchecked first, then checked
    var catItems=grouped[cat].slice().sort(function(a,b){
      return (a.done?1:0)-(b.done?1:0);
    });
    var remaining=catItems.filter(function(i){return !i.done}).length;
    var sec=document.createElement('div');
    sec.className='section';
    var head=document.createElement('div');
    head.className='section-header';
    head.innerHTML='<span>'+info.e+'</span><span>'+info.n+'</span><span class="cnt">'+remaining+'/'+catItems.length+'</span>';
    sec.appendChild(head);
    var group=document.createElement('div');
    group.className='group';
    catItems.forEach(function(item){
      group.appendChild(makeRow(item));
    });
    sec.appendChild(group);
    el.appendChild(sec);
  });
}

function makeRow(item){
  var row=document.createElement('div');
  row.className='row'+(item.done?' done':'');

  var cb=document.createElement('div');
  cb.className='checkbox';

  var txt=document.createElement('div');
  txt.className='row-text';
  txt.textContent=item.name||'';

  var del=document.createElement('button');
  del.className='row-del';
  del.innerHTML='✕';
  del.setAttribute('aria-label','Supprimer');
  del.onclick=function(e){
    e.stopPropagation();
    deleteItemData(item.id);
  };

  row.appendChild(cb);
  row.appendChild(txt);
  row.appendChild(del);
  row.onclick=function(){toggleItemData(item)};
  return row;
}

/* ════════════ ACTIONS ════════════ */
function quickAdd(){
  var input=document.getElementById('quickInput');
  var val=input.value.trim();
  if(!val)return;
  addItemData(val);
  input.value='';
  input.focus();
}

/* ════════════ INIT ════════════ */
document.getElementById('addBtn').addEventListener('click',quickAdd);
document.getElementById('quickInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();quickAdd()}
});
document.getElementById('clearBtn').addEventListener('click',clearDoneData);

startListener();
</script>
